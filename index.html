<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credit Risk Prediction</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 1200px;
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}

h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 35px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    width: 100%;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

label {
    font-weight: 600;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
}

button {
    grid-column: span 2;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, #4CAF50, #2e7d32);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.result-box {
    margin-top: 25px;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
    display: none;
}

.result-low {
    background: #e8f5e9;
    color: #2e7d32;
}

.result-high {
    background: #ffebee;
    color: #c62828;
}

.shap-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
    background: #f8f8f8;
}

.shap-box ul {
    padding-left: 20px;
}

.shap-box li {
    margin-bottom: 10px;
}

@media (max-width: 600px) {

    .container {
        width: 100%;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    button {
        grid-column: span 1;
    }
}

</style>
</head>

<body>

<div class="container">

<h2>Credit Risk Prediction</h2>
<p class="subtitle">Enter customer details to assess credit risk</p>

<form id="form">

<div class="form-grid">

<div class="form-group">
<label>Checking Account</label>
<select id="checking_status">
<option value="A11">< 0€</option>
<option value="A12">0–200€</option>
<option value="A13">> 200€</option>
<option value="A14">No account</option>
</select>
</div>

<div class="form-group">
<label>Duration (months)</label>
<input type="number" id="duration" value="12">
</div>

<div class="form-group">
<label>Credit History</label>
<select id="credit_history">
<option value="A30">No credits</option>
<option value="A31">All paid back</option>
<option value="A32">Existing paid</option>
<option value="A33">Delay in past</option>
<option value="A34">Critical account</option>
</select>
</div>

<div class="form-group">
<label>Purpose</label>
<select id="purpose">
<option value="A40">Car (new)</option>
<option value="A41">Car (used)</option>
<option value="A42">Furniture</option>
<option value="A43">Radio/TV</option>
<option value="A49">Business</option>
</select>
</div>

<div class="form-group">
<label>Credit Amount</label>
<input type="number" id="credit_amount" value="10000">
</div>

<div class="form-group">
<label>Savings</label>
<select id="savings_status">
<option value="A61">< 100€</option>
<option value="A62">100–500€</option>
<option value="A63">500–1000€</option>
<option value="A64">> 1000€</option>
<option value="A65">No savings</option>
</select>
</div>

<div class="form-group">
<label>Employment</label>
<select id="employment">
<option value="A71">Unemployed</option>
<option value="A72">< 1 year</option>
<option value="A73">1–4 years</option>
<option value="A74">4–7 years</option>
<option value="A75">> 7 years</option>
</select>
</div>

<div class="form-group">
<label>Installment Commitment</label>
<input type="number" id="installment_commitment" value="2">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age" value="30">
</div>

<div class="form-group">
<label>Existing Credits</label>
<input type="number" id="existing_credits" value="1">
</div>

</div>

<button id="predictBtn" type="submit">
    Predict
</button>

<div id="loading"
     style="display:none;
            text-align:center;
            margin-top:20px;
            font-weight:bold;">
    ⏳ Calculating risk assessment...
</div>

</form>

<div id="result" class="result-box"></div>

<div id="risk-container" style="display:none; margin-top:20px;">
    <h3>Risk Score</h3>

    <div style="
        width:100%;
        background:#e0e0e0;
        border-radius:10px;
        overflow:hidden;
        height:25px;
    ">
        <div id="risk-bar" style="
            width:0%;
            height:100%;
            transition:0.5s;
        "></div>
    </div>

    <p id="risk-text"></p>
</div>

<div id="loading" style="display:none; text-align:center; margin-top:20px;">
    ⏳ Calculating risk assessment...
</div>

<div id="explanations"></div>
<canvas id="shapChart"></canvas>
</div>

<script>

document.getElementById("form").onsubmit = async function(e) {


    
    e.preventDefault();
    const button = document.getElementById("predictBtn");
    const loadingDiv = document.getElementById("loading");

   
    const data = {
        checking_status: document.getElementById("checking_status").value,
        duration: Number(document.getElementById("duration").value),
        credit_history: document.getElementById("credit_history").value,
        purpose: document.getElementById("purpose").value,
        credit_amount: Number(document.getElementById("credit_amount").value),
        savings_status: document.getElementById("savings_status").value,
        employment: document.getElementById("employment").value,
        installment_commitment: Number(document.getElementById("installment_commitment").value),
        age: Number(document.getElementById("age").value),
        existing_credits: Number(document.getElementById("existing_credits").value)
    };
    
    
    const response = await fetch("https://credit-risk-ml-pipeline.onrender.com/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    loadingDiv.style.display = "none";
    console.log(result);

    const resultDiv = document.getElementById("result");

    resultDiv.style.display = "block";

    resultDiv.className =
        "result-box " +
        (result.prediction === "high risk"
            ? "result-high"
            : "result-low");

    resultDiv.innerText =
        result.prediction === "high risk"
            ? "⚠ High Risk Applicant"
            : "✅ Low Risk Applicant";


    const confidence =
        result.prediction === "high risk"
        ? result.risk_probability
        : result.confidence;

    document.getElementById("confidenceText").innerText =
    `Model Confidence: ${(confidence*100).toFixed(1)}%`;

    const riskContainer =
        document.getElementById("risk-container");

    const riskBar =
        document.getElementById("risk-bar");

    const riskText =
        document.getElementById("risk-text");

    const riskPercent =
        result.risk_probability * 100;

    riskContainer.style.display = "block";

    riskBar.style.width = riskPercent + "%";

    let riskColor;

    if (result.risk_probability < 0.3)
        riskColor = "#4CAF50";
    else if (result.risk_probability < 0.6)
        riskColor = "#ff9800";
    else
        riskColor = "#f44336";

    riskText.innerText =
        riskPercent.toFixed(1) + "% Risk Probability";
    // SHAP DISPLAY

    let recommendation;

    if(result.risk_probability > 0.6)
    {
        recommendation =
            "Review income stability and savings before approval.";
    }
    else
    {
         recommendation =
        "Applicant appears suitable for standard approval.";
    }
    
    
    const explanationsDiv =
        document.getElementById("explanations");
    const allowedFeatures = [
    "num__duration",
    "num__credit_amount",
    "num__installment_commitment",
    "num__age",
    "num__existing_credits",

    "cat__checking_status_A11",
    "cat__checking_status_A12",
    "cat__checking_status_A13",
    "cat__checking_status_A14",

    "cat__credit_history_A30",
    "cat__credit_history_A31",
    "cat__credit_history_A32",
    "cat__credit_history_A33",
    "cat__credit_history_A34",

    "cat__savings_status_A61",
    "cat__savings_status_A62",
    "cat__savings_status_A63",
    "cat__savings_status_A64",
    "cat__savings_status_A65",

    "cat__employment_A71",
    "cat__employment_A72",
    "cat__employment_A73",
    "cat__employment_A74",
    "cat__employment_A75"
];
    const featureNames = {

    // NUMERICAL
    "num__duration": "Loan Duration",
    "num__credit_amount": "Credit Amount",
    "num__installment_commitment": "Installment Commitment",
    "num__residence_since": "Years at Current Residence",
    "num__age": "Age",
    "num__existing_credits": "Existing Credits",
    "num__num_dependents": "Number of Dependents",

    // CHECKING STATUS
    "cat__checking_status_A11": "Low Checking Account Balance",
    "cat__checking_status_A12": "Moderate Checking Balance",
    "cat__checking_status_A13": "High Checking Balance",
    "cat__checking_status_A14": "No Checking Account",

    // CREDIT HISTORY
    "cat__credit_history_A30": "No Credit History",
    "cat__credit_history_A31": "All Credits Paid",
    "cat__credit_history_A32": "Existing Credits Paid",
    "cat__credit_history_A33": "Past Payment Delays",
    "cat__credit_history_A34": "Critical Credit History",

    // SAVINGS
    "cat__savings_status_A61": "Low Savings",
    "cat__savings_status_A62": "Moderate Savings",
    "cat__savings_status_A63": "Good Savings",
    "cat__savings_status_A64": "High Savings",
    "cat__savings_status_A65": "No Savings",

    // EMPLOYMENT
    "cat__employment_A71": "Unemployed",
    "cat__employment_A72": "Short Employment",
    "cat__employment_A73": "1-4 Years Employment",
    "cat__employment_A74": "4-7 Years Employment",
    "cat__employment_A75": "Long-Term Employment",

    // PROPERTY
    "cat__property_magnitude_A121": "Real Estate Assets",
    "cat__property_magnitude_A122": "Savings Insurance",
    "cat__property_magnitude_A123": "Car Ownership",
    "cat__property_magnitude_A124": "No Major Property"
};

    const sortedFeatures =
        Object.entries(result.shap_values)
.filter(([feature]) => allowedFeatures.includes(feature))
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
        .slice(0, 5);

    let html = `
        <div class="shap-box">
            <h3>Top Factors Affecting Prediction</h3>
            <ul>
    `;

    for (const [feature, value] of sortedFeatures) {

        const cleanName =
            featureNames[feature] || feature;

        const impact =
            value > 0
            ? "⬆ Increased Risk"
            : "⬇ Reduced Risk";

        html += `
            <li>
                <strong>${cleanName}</strong>:
                ${impact}
                (${value.toFixed(3)})
            </li>
        `;
    }

    html += `
            </ul>
        </div>
    `;

    explanationsDiv.innerHTML = html;
    // SHAP BAR CHART

const labels = sortedFeatures.map(
    ([feature]) => featureNames[feature] || feature
);

const values = sortedFeatures.map(
    ([_, value]) => value
);

// destroy old chart if exists
if (window.shapChartInstance) {
    window.shapChartInstance.destroy();
}

const ctx = document
    .getElementById("shapChart")
    .getContext("2d");

window.shapChartInstance = new Chart(ctx, {
    type: "bar",
    indexAxis: "y",
    data: {
        labels: labels,
        datasets: [{
            label: "SHAP Impact",
            data: values,
            backgroundColor: values.map(v =>
                v > 0
                ? "rgba(220,53,69,0.7)"
                : "rgba(40,167,69,0.7)"
            ),
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

button.disabled = false;
        button.innerText = "Predict";
        loadingDiv.style.display = "none";


};

</script>

</body>
</html>
