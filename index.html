<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credit Risk Prediction</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* CARD */
.container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 1200px;
}

/* TITLE */
h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 35px;
}

/* GRID */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    width: 100%;
}

/* EACH FIELD */
.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.container {
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}
/* INPUTS */
label {
    font-weight: 600;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
}

/* BUTTON */
button {
    grid-column: span 2; /* full width */
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, #4CAF50, #2e7d32);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* RESULT */
.result-box {
    margin-top: 25px;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
    display: none;
}

.result-low {
    background: #e8f5e9;
    color: #2e7d32;
}

.result-high {
    background: #ffebee;
    color: #c62828;
}

/* MOBILE */
@media (max-width: 600px) {
    .container {
        width: 100%;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    button {
        grid-column: span 1;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>Credit Risk Prediction</h2>
<p class="subtitle">Enter customer details to assess credit risk</p>

<form id="form">

<div class="form-grid">

<div class="form-group">
<label>Checking Account</label>
<select id="checking_status">
<option value="A11">< 0€</option>
<option value="A12">0–200€</option>
<option value="A13">> 200€</option>
<option value="A14">No account</option>
</select>
</div>

<div class="form-group">
<label>Duration (months)</label>
<input type="number" id="duration">
</div>

<div class="form-group">
<label>Credit History</label>
<select id="credit_history">
<option value="A30">No credits</option>
<option value="A31">All paid back</option>
<option value="A32">Existing paid</option>
<option value="A33">Delay in past</option>
<option value="A34">Critical account</option>
</select>
</div>

<div class="form-group">
<label>Purpose</label>
<select id="purpose">
<option value="A40">Car (new)</option>
<option value="A41">Car (used)</option>
<option value="A42">Furniture</option>
<option value="A43">Radio/TV</option>
<option value="A49">Business</option>
</select>
</div>

<div class="form-group">
<label>Credit Amount</label>
<input type="number" id="credit_amount">
</div>

<div class="form-group">
<label>Savings</label>
<select id="savings_status">
<option value="A61">< 100€</option>
<option value="A62">100–500€</option>
<option value="A63">500–1000€</option>
<option value="A64">> 1000€</option>
<option value="A65">No savings</option>
</select>
</div>

<div class="form-group">
<label>Employment</label>
<select id="employment">
<option value="A71">Unemployed</option>
<option value="A72">< 1 year</option>
<option value="A73">1–4 years</option>
<option value="A74">4–7 years</option>
<option value="A75">> 7 years</option>
</select>
</div>

<div class="form-group">
<label>Installment Commitment</label>
<input type="number" id="installment_commitment">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age">
</div>

<div class="form-group">
<label>Existing Credits</label>
<input type="number" id="existing_credits">
</div>

</div> <!-- ✅ CLOSE GRID HERE -->

<button type="submit">Predict</button>

</form>

<div id="result" class="result-box"></div>

<script>
document.getElementById("form").onsubmit = async function(e) {
    e.preventDefault();

    const data = {
        checking_status: document.getElementById("checking_status").value,
        duration: Number(document.getElementById("duration").value),
        credit_history: document.getElementById("credit_history").value,
        purpose: document.getElementById("purpose").value,
        credit_amount: Number(document.getElementById("credit_amount").value),
        savings_status: document.getElementById("savings_status").value,
        employment: document.getElementById("employment").value,
        installment_commitment: Number(document.getElementById("installment_commitment").value),
        age: Number(document.getElementById("age").value),
        existing_credits: Number(document.getElementById("existing_credits").value)
    };

    const response = await fetch("https://credit-risk-ml-pipeline.onrender.com/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";

    resultDiv.className = "result-box " + 
        (result.prediction === "high risk" ? "result-high" : "result-low");

    resultDiv.innerText =
        "Prediction: " + result.prediction +
        " | Risk: " + result.risk_probability;
};
</script>

</body>
</html>
